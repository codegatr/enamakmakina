<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" width="1100" height="340">
  <!-- Sol taraf: Çember içinde E -->
  <g transform="translate(170, 170)">
    <!-- Dış siyah kalın çember -->
    <circle r="148" fill="none" stroke="#0f172a" stroke-width="18"/>
    <!-- İç mavi ince çember -->
    <circle r="122" fill="none" stroke="#1e3a8a" stroke-width="6"/>
    <!-- E harfi (stilize, koyu mavi) -->
    <g fill="#1e3a8a">
      <!-- Dikey gövde -->
      <rect x="-45" y="-70" width="24" height="140" rx="2"/>
      <!-- Üst yatay kol -->
      <rect x="-45" y="-70" width="94" height="22" rx="2"/>
      <!-- Orta yatay kol (kısa) -->
      <rect x="-45" y="-10" width="72" height="20" rx="2"/>
      <!-- Alt yatay kol -->
      <rect x="-45" y="48" width="94" height="22" rx="2"/>
    </g>
  </g>

  <!-- Sağ taraf: ENA-MAK + KUMLAMA -->
  <g>
    <!-- ENA-MAK ana yazı -->
    <text x="380" y="170" font-family="'Archivo', Arial Black, sans-serif" font-size="150" font-weight="900" fill="#1e3a8a" letter-spacing="-4">ENA-MAK</text>
    <!-- Alt KUMLAMA -->
    <text x="385" y="275" font-family="'Archivo', Arial Black, sans-serif" font-size="82" font-weight="900" fill="#0f172a" letter-spacing="12">KUMLAMA</text>
  </g>
</svg>