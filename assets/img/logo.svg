<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Logo ikonu: koyu mavi yuvarlak kare, içinde çember ve E harfi -->
  <g transform="translate(4, 4)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="url(#bg)"/>
    <!-- Çember -->
    <circle cx="26" cy="26" r="16.5" fill="none" stroke="#ffffff" stroke-width="2.2"/>
    <!-- E harfi -->
    <g fill="#ffffff">
      <rect x="19" y="17" width="14" height="2.6" rx="0.5"/>
      <rect x="19" y="24.7" width="11" height="2.6" rx="0.5"/>
      <rect x="19" y="32.4" width="14" height="2.6" rx="0.5"/>
      <rect x="19" y="17" width="2.6" height="18" rx="0.5"/>
    </g>
  </g>

  <!-- Text: ENAMAK -->
  <text x="66" y="32"
        font-family="'Space Grotesk', 'Inter', Arial, sans-serif"
        font-weight="800" font-size="22" fill="#0f172a"
        letter-spacing="1">ENA-MAK</text>

  <!-- Alt: KUMLAMA -->
  <text x="66" y="48"
        font-family="'Inter', Arial, sans-serif"
        font-weight="500" font-size="10" fill="#64748b"
        letter-spacing="4.5">KUMLAMA</text>
</svg>
